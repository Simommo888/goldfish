name: Goldfish

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goldfish:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      AI_NEWS_LLM_MODEL: deepseek-v4-pro
      AI_NEWS_LLM_BASE_URL: https://api.deepseek.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/goldfish/requirements.txt
          pip install -e scripts/goldfish

      - name: Run goldfish
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            goldfish run --no-llm --verbose
          else
            goldfish run --verbose
          fi

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 04_Resources/AI-News 01_Dashboard/Home.md 05_Permanent-Notes/AI-Trends 11_Business-Ideas/AI-News-Inspirations 09_Prompts/AI-News 02_Projects/AI-News-Ideas
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily AI news report"
            git push
          fi
